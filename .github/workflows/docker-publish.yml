name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/claude-relay-service
      DOCKERHUB_IMAGE: jazzylol/claude-relay-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check Docker Hub secrets
      id: dockerhub
      run: |
        if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "⚠️ Docker Hub secrets not configured, will only push to GHCR"
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: steps.dockerhub.outputs.available == 'true'
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        VERSION=$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0")
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "📦 Version: ${VERSION}, SHA: ${SHORT_SHA}"

    - name: Prepare tags
      id: tags
      run: |
        TAGS="${{ env.GHCR_IMAGE }}:latest"
        TAGS="${TAGS},${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}"
        TAGS="${TAGS},${{ env.GHCR_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}"

        if [ "${{ steps.dockerhub.outputs.available }}" = "true" ]; then
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:latest"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:sha-${{ steps.version.outputs.short_sha }}"
        fi

        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "🏷️ Tags: ${TAGS}"

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.revision=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
